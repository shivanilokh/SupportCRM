<!DOCTYPE html>
<html>
<head>
    <title>Support CRM</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Support CRM System</h1>

    <form id="ticketForm">
        <input type="text" id="customer_name" placeholder="Customer Name" required>
        <input type="email" id="customer_email" placeholder="Customer Email" required>
        <input type="text" id="subject" placeholder="Subject" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <button type="submit">Create Ticket</button>
    </form>

    <h2>All Tickets</h2>

    <button id="loadBtn">Load Tickets</button>

    <div id="tickets"></div>

    <script src="script.js"></script>

</body>
</html>
